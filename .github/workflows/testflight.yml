# TestFlight-Upload – manuell über den Actions-Tab auslösbar ("Run workflow").
#
# Signing komplett ohne Mac: Xcode "Cloud Signing" erzeugt und verwaltet
# Zertifikat + Provisioning Profile automatisch über den App Store Connect
# API-Key (die drei GitHub Secrets). Der Upload passiert direkt aus
# xcodebuild -exportArchive (destination: upload).
#
# Build-Nummer = GitHub-Run-Nummer → jeder Lauf ist automatisch neuer.

name: TestFlight

on:
  workflow_dispatch: {}

jobs:
  testflight:
    name: Archivieren, signieren, hochladen
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Secrets prüfen
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          fehlt=""
          [ -z "$API_KEY" ]   && fehlt="$fehlt APP_STORE_CONNECT_API_KEY"
          [ -z "$KEY_ID" ]    && fehlt="$fehlt APP_STORE_CONNECT_KEY_ID"
          [ -z "$ISSUER_ID" ] && fehlt="$fehlt APP_STORE_CONNECT_ISSUER_ID"
          [ -z "$TEAM_ID" ]   && fehlt="$fehlt APPLE_TEAM_ID"
          if [ -n "$fehlt" ]; then
            echo "::error::Fehlende GitHub Secrets:$fehlt (Settings → Secrets and variables → Actions)"
            exit 1
          fi

      - name: XcodeGen installieren
        run: brew install xcodegen

      - name: API-Key ablegen
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_KEY" > ~/private_keys/AuthKey_${KEY_ID}.p8

      - name: Xcode-Projekt erzeugen
        run: xcodegen generate

      # DEVELOPMENT_TEAM kommt als Build-Setting-Override aus dem Secret:
      # Automatic Signing braucht die Team-ID, sonst Exit 65 noch vor dem API-Key.
      # CODE_SIGN_IDENTITY="Apple Distribution": schon das Archiv wird fürs
      # App-Store-Profil signiert – Development-Profile würden mindestens ein
      # registriertes Gerät im Team verlangen (frische Accounts haben keines).
      - name: Archivieren (Cloud Signing)
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project HelenasLernWeide.xcodeproj \
            -scheme HelenasLernWeide \
            -destination 'generic/platform=iOS' \
            -archivePath build/LernWeide.xcarchive \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            | xcbeautify --renderer github-actions

      - name: Exportieren & zu TestFlight hochladen
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          plutil -insert teamID -string "$TEAM_ID" ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/LernWeide.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            2>&1 | tee export.log || {
              grep -iE "error" export.log | head -20 | while IFS= read -r zeile; do echo "::error::$zeile"; done
              exit 1
            }

      - name: Aufräumen (Key löschen)
        if: always()
        run: rm -rf ~/private_keys
