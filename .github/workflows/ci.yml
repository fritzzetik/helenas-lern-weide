# CI für Helenas Lern-Weide
# Läuft bei jedem Push und Pull Request auf main.
# Testet die Kernlogik (LernWeideCore + MatheWeide) mit Swift Testing auf einem macOS-Runner.
# Live-LLM-Tests (Tag: liveLLM) werden automatisch übersprungen, da CI=true gesetzt ist.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-core:
    name: Kernlogik testen (Swift Testing)
    runs-on: macos-26          # Xcode 26 / iOS-26-SDK
    timeout-minutes: 15

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Swift-Version anzeigen (Debug)
        run: swift --version

      # Fehlgeschlagene Tests landen als ::error-Annotations im Check –
      # damit sind sie auch ohne Log-Zugriff über die API diagnostizierbar.
      - name: Tests ausführen
        run: |
          set -o pipefail
          if ! swift test --parallel 2>&1 | tee test.log; then
            grep -E "recorded an issue|Test .* failed|error:" test.log | head -40 | while IFS= read -r zeile; do
              echo "::error::$zeile"
            done
            exit 1
          fi

